name: SNS Auto Post

on:
  # microCMS webhook から repository_dispatch で起動
  repository_dispatch:
    types: [microcms-publish]
  # 手動実行も可能（テスト用）
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Wait for thumbnail deployment
        env:
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
        run: |
          ARTICLE_ID=$(curl -s "https://bullcom.microcms.io/api/v1/blogs?limit=1&fields=id" -H "X-MICROCMS-API-KEY: $MICROCMS_API_KEY" | python -c "import sys,json; print(json.load(sys.stdin)['contents'][0]['id'])")
          echo "Article ID: $ARTICLE_ID"
          for i in {1..30}; do
            if curl -sf "https://bullcom.jp/blog-thumbnails/${ARTICLE_ID}.jpg" -o /dev/null; then
              echo "Thumbnail ready"
              break
            fi
            echo "Waiting for thumbnail... ($i/30)"
            sleep 10
          done

      - name: Post to X (Twitter)
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: node scripts/post-to-x.cjs

      - name: Post to Instagram & Facebook
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_PAGE_ACCESS_TOKEN: ${{ secrets.IG_PAGE_ACCESS_TOKEN }}
        run: node scripts/post-to-instagram.cjs
