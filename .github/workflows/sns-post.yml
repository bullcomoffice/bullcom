name: SNS Auto Post

on:
  repository_dispatch:
    types: [microcms-publish]
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Trigger Cloudflare rebuild (safety double-fire)
        env:
          DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "CLOUDFLARE_DEPLOY_HOOK_URL not set, skipping"
            exit 0
          fi
          echo "Triggering Cloudflare deploy hook..."
          RESPONSE=$(curl -s -X POST "$DEPLOY_HOOK_URL")
          echo "Response: $RESPONSE"

      - name: Post to X (Twitter)
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SNS_HASHTAGS: ${{ secrets.SNS_HASHTAGS }}
          SNS_POST_MAX_MINUTES: ${{ secrets.SNS_POST_MAX_MINUTES }}
        run: node scripts/post-to-x.cjs

      - name: Post to Instagram & Facebook
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_PAGE_ACCESS_TOKEN: ${{ secrets.IG_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SNS_HASHTAGS_IG: ${{ secrets.SNS_HASHTAGS_IG }}
          SNS_POST_MAX_MINUTES: ${{ secrets.SNS_POST_MAX_MINUTES }}
        run: node scripts/post-to-instagram.cjs

      - name: Post to Google Business Profile
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          GBP_CLIENT_ID: ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
          GBP_ACCOUNT_ID: ${{ secrets.GBP_ACCOUNT_ID }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SNS_POST_MAX_MINUTES: ${{ secrets.SNS_POST_MAX_MINUTES }}
        run: node scripts/post-to-gbp.cjs
