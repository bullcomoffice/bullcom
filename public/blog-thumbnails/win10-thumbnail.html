<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; }

  .card {
    width: 1280px;
    height: 720px;
    background: linear-gradient(135deg, #0a0f1e 0%, #1a1040 40%, #2d1b6b 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 64px 80px;
    position: relative;
    font-family: "Noto Sans JP", "Yu Gothic", sans-serif;
    overflow: hidden;
  }

  /* グリッドパターン */
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* 光の演出 */
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }
  .glow-1 { width: 500px; height: 500px; background: rgba(120,80,255,0.35); top: -100px; left: -100px; }
  .glow-2 { width: 400px; height: 400px; background: rgba(255,80,80,0.2); bottom: -80px; right: 200px; }

  /* 左テキスト */
  .left {
    position: relative; z-index: 1;
    max-width: 640px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,80,80,0.2);
    border: 1px solid rgba(255,80,80,0.5);
    color: #ff8080;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 28px;
  }
  .badge .dot { width: 8px; height: 8px; background: #ff5050; border-radius: 50%; animation: blink 1.2s infinite; }

  .title {
    font-size: 72px;
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }
  .title .highlight { color: #ff6b6b; }

  .subtitle {
    font-size: 30px;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 40px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,0.5);
    font-size: 20px;
    font-weight: 700;
    font-family: "Inter", sans-serif;
    letter-spacing: 0.1em;
  }
  .brand::before {
    content: '';
    width: 32px; height: 2px;
    background: rgba(255,255,255,0.3);
  }

  /* 右：警告アイコン */
  .right {
    position: relative; z-index: 1;
    flex-shrink: 0;
  }

  .warning-box {
    width: 340px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 36px 32px;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  .win-icon {
    width: 100px; height: 100px;
    margin: 0 auto 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    opacity: 0.5;
  }
  .win-icon div { background: #999; border-radius: 3px; }

  .warning-icon {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 20px;
  }

  .warning-title {
    font-size: 22px;
    font-weight: 800;
    color: #ff6b6b;
    margin-bottom: 8px;
  }

  .warning-desc {
    font-size: 16px;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
  }

  .status-bar {
    margin-top: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 15px;
    color: rgba(255,255,255,0.4);
    font-family: "Courier New", monospace;
  }
  .status-dot { width: 8px; height: 8px; background: #ff4444; border-radius: 50%; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="card">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="left">
    <div class="badge">
      <span class="dot"></span>
      セキュリティ警告
    </div>
    <div class="title">
      Windows 10<br>
      <span class="highlight">サポート終了</span>
    </div>
    <div class="subtitle">
      まだ使い続けていますか？<br>
      今すぐ対応が必要です
    </div>
    <div class="brand">BULLCOM</div>
  </div>

  <div class="right">
    <div class="warning-box">
      <div class="warning-icon">⚠️</div>
      <div class="warning-title">サポート終了</div>
      <div class="warning-desc">
        2025年10月14日<br>
        セキュリティ更新が<br>
        停止されました
      </div>
      <div class="status-bar">
        <span class="status-dot"></span>
        UPDATE: STOPPED
      </div>
    </div>
  </div>
</div>
</body>
</html>
